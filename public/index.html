<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant IA</title>

<style>
body { margin:0; font-family:Arial; background:#efeae2; display:flex; flex-direction:column; height:100vh;}
header { background:#008069; color:white; padding:15px; }
#chat { flex:1; overflow:auto; padding:10px;}
.msg { padding:10px; margin:5px; border-radius:10px; max-width:75%;}
.user { background:#d9fdd3; margin-left:auto;}
.ai { background:white;}
.input-box { display:flex; padding:10px; background:#eee;}
input { flex:1; padding:10px; border-radius:20px; border:none;}
button { margin-left:5px; }
</style>
</head>

<body>

<header>🤖 Assistant IA</header>

<div id="chat"></div>

<div class="input-box">
<button onclick="voice()">🎤</button>
<input id="msg" placeholder="Message...">
<button onclick="send()">➡️</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg");

// 💾 historique
let history = JSON.parse(localStorage.getItem("chat")) || [];
history.forEach(m => add(m.role, m.text));

function add(role, text) {
  const d = document.createElement("div");
  d.className = "msg " + role;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function save(role, text) {
  history.push({ role, text });
  localStorage.setItem("chat", JSON.stringify(history));
}

// 🎤 voix
function voice(){
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang="fr-FR";
  rec.onresult = e => {
    input.value = e.results[0][0].transcript;
    send();
  };
  rec.start();
}

// 🔊 lecture IA
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";
  speechSynthesis.speak(u);
}

// 🚀 envoyer
async function send(){
  const text = input.value.trim();
  if(!text) return;

  add("user", text);
  save("user", text);
  input.value="";

  const aiDiv = document.createElement("div");
  aiDiv.className="msg ai";
  chat.appendChild(aiDiv);

  try{
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message:text })
    });

    const data = await res.json();

    const reply = data.text || data.error || "Erreur";

    let i=0;
    function type(){
      if(i<reply.length){
        aiDiv.textContent += reply[i++];
        setTimeout(type,15);
      } else {
        save("ai", reply);
        speak(reply);
      }
    }
    type();

  }catch(e){
    aiDiv.textContent="Erreur réseau";
  }
}

input.addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
