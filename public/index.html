<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL OMNISCIENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #0ff; --magenta: #f0f; --bg: #030305; --grid: rgba(0, 255, 255, 0.05); }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Share Tech Mono', monospace; 
            height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        header { 
            padding: 20px; text-align: center; font-family: 'Orbitron'; 
            letter-spacing: 5px; background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--neon); box-shadow: 0 0 15px rgba(0,255,255,0.2);
            text-shadow: 0 0 5px var(--neon); font-size: 1.2rem;
        }
        #chat { 
            flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; 
        }
        .msg { 
            max-width: 90%; padding: 15px; position: relative; line-height: 1.6; font-size: 15px;
            white-space: pre-wrap; word-wrap: break-word; /* Pour bien afficher le texte formaté */
        }
        .user { 
            align-self: flex-end; border-right: 4px solid var(--neon); 
            background: rgba(0, 255, 255, 0.08); text-shadow: 0 0 2px var(--neon);
        }
        .ai { 
            align-self: flex-start; border-left: 4px solid var(--magenta); 
            background: rgba(255, 0, 255, 0.05); color: #e0e0e0;
        }
        .status { font-size: 12px; color: #555; align-self: flex-start; margin-top: -15px; }
        .input-box { 
            padding: 20px; display: flex; gap: 15px; background: rgba(0,0,0,0.9);
            border-top: 1px solid #222; box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
        }
        input { 
            flex: 1; background: #080808; border: 1px solid #333; padding: 15px; 
            color: var(--neon); outline: none; font-family: 'Share Tech Mono'; font-size: 16px;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: inset 0 0 10px rgba(0,255,255,0.1); }
        button { 
            background: rgba(255, 0, 255, 0.1); border: 1px solid var(--magenta); 
            color: var(--magenta); padding: 0 30px; cursor: pointer; 
            font-family: 'Orbitron'; font-weight: bold; transition: all 0.3s;
            letter-spacing: 2px;
        }
        button:hover { 
            background: var(--magenta); color: #000; box-shadow: 0 0 20px rgba(255,0,255,0.6); 
        }
        /* Scrollbar custom */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border: 1px solid var(--neon); }
    </style>
</head>
<body>
    <header>SYSTÈME GLOBAL CONNECTÉ - RECHERCHE WEB [ON]</header>
    <div id="chat">
        <div class="msg ai">INITIALISATION...<br>Accès réseau mondial confirmé. Entrez votre requête.</div>
    </div>
    <div class="input-box">
        <input type="text" id="ui" placeholder="Ex: Quel est le prix du Bitcoin aujourd'hui ?" onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">EXECUTE</button>
    </div>

    <script>
        async function send() {
            const ui = document.getElementById('ui');
            const chat = document.getElementById('chat');
            const val = ui.value.trim();
            if(!val) return;

            // Ajout du message utilisateur
            chat.innerHTML += `<div class="msg user">SYS_REQ: ${val}</div>`;
            ui.value = '';
            
            // Ajout d'un indicateur de chargement
            const loadingId = 'load-' + Date.now();
            chat.innerHTML += `<div id="${loadingId}" class="status">Recherche sur le réseau mondial en cours...</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });
                
                const data = await res.json();
                document.getElementById(loadingId).remove(); // Retire le chargement

                if(res.ok) {
                    chat.innerHTML += `<div class="msg ai">${data.text}</div>`;
                } else {
                    chat.innerHTML += `<div class="msg ai" style="color:#ff3333; border-color:#ff3333;">[ERREUR CRITIQUE] ${data.error}</div>`;
                }
            } catch {
                document.getElementById(loadingId).remove();
                chat.innerHTML += `<div class="msg ai" style="color:#ff3333; border-color:#ff3333;">[ÉCHEC DE LA CONNEXION AU SERVEUR]</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
